<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>宁宁生日快乐！</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {
  background:#000;
  height:100vh;
  height:100dvh;
  overflow:hidden;
}
/* 播放器铺满手机，保留原生控制条 */
#videoWrap {
  width:100vw;
  height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
}
#myVideo {
  width:100%;
  height:auto;
  max-height:100dvh;
  /* contain=完整显示画面不裁剪，有黑边；cover=铺满裁剪 */
  object-fit:contain;
}
</style>
</head>
<body>

<div id="videoWrap">
  <!-- controls:显示进度条/音量/全屏；去掉muted才有声音 -->
  <video id="myVideo" controls playsinline webkit-playsinline>
    <source src="111.mp4" type="video/mp4">
    你的浏览器不支持视频播放
  </video>
</div>

<script>
const v = document.getElementById('myVideo');

// 解决移动端必须手动触发才有声音
document.addEventListener('touchstart', ()=>{
  v.load();
}, {once:true});
</script>

</body>
</html>
